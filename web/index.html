<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Parameters Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>

<body>
    <div class="sidebar">
        <div class="container is-fluid">
            <h1 class="title is-4 has-text-centered">Parameters</h1>

            <form id="gridForm">
                <div class="upload-section">
                    <h2 class="title is-5">Upload Images</h2>
                    <div class="file is-boxed is-fullwidth has-name">
                        <label class="file-label">
                            <input class="file-input" type="file" id="imageUpload" name="imageUpload" multiple accept=".jpg, .jpeg, .png">
                            <span class="file-cta">
                                <span class="file-label">
                                    Choose images…
                                </span>
                            </span>
                            <span class="file-name" id="fileName">
                                No files selected
                            </span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="numCols">Number of Columns</label>
                    <div class="control">
                        <input class="input" type="number" id="numCols" name="numCols" min="1" value="4" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="numRows">Number of Rows</label>
                    <div class="control">
                        <input class="input" type="number" id="numRows" name="numRows" min="1" value="2" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="horizontalGap">Horizontal Gap <span class="unit">(in
                            millimeters)</span></label>
                    <div class="control">
                        <input class="input" type="number" step="0.01" id="horizontalGap" name="horizontalGap" min="0" value="3"
                            required>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="verticalGap">Vertical Gap <span class="unit">(in millimeters)</span></label>
                    <div class="control">
                        <input class="input" type="number" step="0.01" id="verticalGap" name="verticalGap" min="0" value="3"
                            required>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="minHorizontalMargin">Minimum Horizontal Margin <span class="unit">(in
                            millimeters)</span></label>
                    <div class="control">
                        <input class="input" type="number" step="0.01" id="minHorizontalMargin" name="minHorizontalMargin" min="0"
                            value="6.35" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="minVerticalMargin">Minimum Vertical Margin <span class="unit">(in
                            millimeters)</span></label>
                    <div class="control">
                        <input class="input" type="number" step="0.01" id="minVerticalMargin" name="minVerticalMargin" min="0"
                            value="6.35" required>
                    </div>
                </div>

                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-primary is-fullwidth">Generate</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div id="outputArea" class="main-content">
        <iframe id="test" src="" frameborder="0"></iframe>
    </div>
</body>
</html>
